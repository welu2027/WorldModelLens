# Reward Attribution Experiment
# Run: wml run reward_attribution.yaml

experiment_name: reward_attribution
description: Attribute reward predictions to latent dimensions

steps:
  - name: collect_trajectories
    type: collect
    n_episodes: 50
    output: trajectories/

  - name: reward_attribution
    type: reward_attribution
    method: gradient_times_activation
    component: z_posterior
    output: results/reward_attribution.json

  - name: visualize
    type: visualize
    plots:
      - dim_attribution_bar
      - reward_timeline
    output: results/attribution_plots/
