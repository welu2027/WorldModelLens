global:
  storageClass: standard-rwo
  imageRegistry: ghcr.io/worldmodellens
  imagePullSecrets:
    - name: ghcr-secret

replicaCount: 2

image:
  repository: wml-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.worldmodellens.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wml-api-tls
      hosts:
        - api.worldmodellens.ai

resources:
  limits:
    cpu: 4
    memory: 16Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 1
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5

config:
  logLevel: INFO
  maxTrajectoryLength: 100000
  cacheSizeMB: 2048
  enablePrometheus: true
  enableTracing: true

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: "" # Set via secret
  master:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1
        memory: 2Gi

postgresql:
  enabled: true
  auth:
    username: wml
    password: "" # Set via secret
    database: wml
  primary:
    persistence:
      enabled: true
      size: 50Gi
    resources:
      limits:
        cpu: 2
        memory: 8Gi

prometheus:
  enabled: true
  server:
    retention: 30d
    persistentVolume:
      enabled: true
      size: 50Gi

grafana:
  enabled: true
  adminPassword: "" # Set via secret
  persistence:
    enabled: true
    size: 10Gi

otel:
  enabled: true
  collector:
    config:
      receivers:
        otlp:
          protocols:
            grpc:
            http:
      exporters:
        prometheus:
          endpoint: "0.0.0.0:8889"
        jaeger:
          endpoint: jaeger-collector:14250
      service:
        pipelines:
          traces:
            receivers: [otlp]
            exporters: [jaeger]
          metrics:
            receivers: [otlp]
            exporters: [prometheus]

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: production
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1

priorityClassName: high-priority

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"
